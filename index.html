<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Gelombang Sinus</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden; font-family:Arial;">

<!-- UI -->
<div style="position:fixed; top:10px; left:10px; z-index:10; background:white; padding:12px; border-radius:10px;">
  <b>Kontrol Gelombang</b><br><br>

  Amplitudo: <span id="valA">1</span><br>
  <input type="range" id="amp" min="0.5" max="2" step="0.1" value="1"><br><br>

  Frekuensi: <span id="valF">3</span><br>
  <input type="range" id="freq" min="1" max="10" step="1" value="3">
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- MARKER -->
  <a-marker preset="hiro">
    <a-entity id="wave"></a-entity>
  </a-marker>

  <!-- CAMERA -->
  <a-entity camera></a-entity>

</a-scene>

<script>
let wave = document.querySelector("#wave");

let A = 1;
let f = 3;
let t = 0;

// slider
let ampSlider = document.getElementById("amp");
let freqSlider = document.getElementById("freq");

ampSlider.oninput = function(){
  A = parseFloat(this.value);
  document.getElementById("valA").innerText = A;
}

freqSlider.oninput = function(){
  f = parseFloat(this.value);
  document.getElementById("valF").innerText = f;
}

// buat gelombang (titik-titik stabil)
function createWave(){
  if(!wave) return;

  wave.innerHTML = "";

  for(let x=-3; x<=3; x+=0.15){
    let y = A * Math.sin(f * x - t);

    let point = document.createElement("a-sphere");
    point.setAttribute("position", `${x} ${y} 0`);
    point.setAttribute("radius", "0.05");
    point.setAttribute("color", "#0077ff");

    wave.appendChild(point);
  }
}

// animasi
function animate(){
  t += 0.08;
  createWave();
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
